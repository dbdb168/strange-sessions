<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strange Sessions — Design Options</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f4f1;
            color: #2c2c2c;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wrapper {
            text-align: center;
            padding: 48px;
        }
        h1 {
            font-weight: 300;
            font-size: 28px;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }
        p {
            color: #8a8a8a;
            font-size: 14px;
            margin-bottom: 48px;
        }
        .options {
            display: flex;
            gap: 32px;
            justify-content: center;
            flex-wrap: wrap;
        }
        a.option {
            display: block;
            width: 280px;
            padding: 40px 32px;
            text-decoration: none;
            border: 1px solid #ddd;
            transition: all 0.3s;
        }
        a.option:hover {
            border-color: #999;
            transform: translateY(-2px);
        }
        a.option.dark {
            background: #110f0d;
            border-color: #2a2520;
        }
        a.option.dark:hover { border-color: #c4a882; }
        a.option.dark .label { color: #e8e2d8; }
        a.option.dark .desc { color: #9a9284; }
        a.option.light {
            background: #ffffff;
        }
        a.option.light .label { color: #2c2c2c; }
        a.option.light .desc { color: #8a8a8a; }
        .label {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .desc {
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>Strange Sessions</h1>
        <p>Two directions. Same copy. Pick the one that feels right.</p>
        <div class="options">
            <a href="/dark.html" class="option dark">
                <div class="label">Dark</div>
                <div class="desc">Editorial. Ink and brass. Monocle energy.</div>
            </a>
            <a href="/light.html" class="option light">
                <div class="label">Light</div>
                <div class="desc">Open. White space and sage. Creative Confidence energy.</div>
            </a>
        </div>
    </div>
</body>
</html>
